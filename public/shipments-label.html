<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>بوليصة الشحن</title>

<style>

body{
background:#f3f3f3;
font-family:Tahoma;
padding:20px;
}

.card{

max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px rgba(0,0,0,.1);

}

.logo{

text-align:center;
font-size:30px;
font-weight:bold;
color:#f6b32d;

}

.number{

background:#f6b32d;
color:white;
padding:15px;
border-radius:15px;
text-align:center;
font-size:24px;
font-weight:bold;
margin-top:20px;

}

.box{

background:#faf7ef;
padding:15px;
border-radius:15px;
margin-top:15px;

}

.title{

font-weight:bold;
margin-bottom:10px;

}

.print{

width:100%;
padding:15px;
background:#f6b32d;
color:white;
border:none;
border-radius:15px;
font-size:18px;
margin-top:20px;

}

@media print{

.print{
display:none;
}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🚚 نقطة شحن
</div>

<div class="number"
id="shipmentNumber">

</div>

<div class="box">

<div class="title">
المرسل
</div>

<div id="sender"></div>

</div>

<div class="box">

<div class="title">
المستلم
</div>

<div id="receiver"></div>

</div>

<div class="box">

<div class="title">
تفاصيل الشحنة
</div>

<div id="details"></div>

</div>

<button class="print"
onclick="window.print()">

🖨️ طباعة

</button>

</div>

<script>

const shipment =

JSON.parse(localStorage.getItem("shipment"));

if(shipment){

document.getElementById("shipmentNumber").innerText =

shipment.shipmentNumber;

document.getElementById("sender").innerHTML =

shipment.senderName
+
"<br>"
+
shipment.senderPhone
+
"<br>"
+
shipment.senderCity;

document.getElementById("receiver").innerHTML =

shipment.receiverName
+
"<br>"
+
shipment.receiverPhone
+
"<br>"
+
shipment.receiverCity;

document.getElementById("details").innerHTML =

"الوزن: "
+
shipment.weight
+
"<br>"

+
"القطع: "
+
shipment.pieces

+
"<br>"

+
"السعر: "
+
shipment.price
+
" ر.س";

}

</script>

</body>

</html>
