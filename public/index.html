<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>نقطة شحن | تسجيل الدخول</title>

<link rel="stylesheet" href="style.css">

<style>

body{

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    background:#111;

}

.login-card{

    width:100%;

    max-width:400px;

    background:#1d1d1d;

    padding:30px;

    border-radius:20px;

    box-shadow:0 0 15px rgba(0,0,0,.4);

}

.logo{

    text-align:center;

    font-size:40px;

    color:#ffb300;

    margin-bottom:15px;

}

.title{

    text-align:center;

    margin-bottom:30px;

    font-size:28px;

    color:white;

}

form{

    display:flex;

    flex-direction:column;

    gap:15px;

}

input{

    padding:15px;

    border:none;

    border-radius:10px;

    font-size:16px;

}

button{

    background:#ff9800;

    color:white;

    border:none;

    padding:15px;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#e68900;

}

.note{

    margin-top:20px;

    text-align:center;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

🚚

</div>



<div class="title">

نقطة شحن

</div>



<form id="loginForm">

<input
type="text"
id="username"
placeholder="اسم المستخدم"
required
>

<input
type="password"
id="password"
placeholder="كلمة المرور"
required
>

<button type="submit">

تسجيل الدخول

</button>

</form>



<div class="note">

المدير:
admin / 1234

<br><br>

الموظف:
employee / 1234

</div>

</div>



<script>

document
.getElementById("loginForm")

.addEventListener(
"submit",

async function(e){

    e.preventDefault();



    const username =
    document.getElementById(
    "username"
    ).value;



    const password =
    document.getElementById(
    "password"
    ).value;



    const response =
    await fetch(

        "/login",

        {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                username,
                password

            })

        }

    );



    const result =
    await response.json();



    if(result.success){

        localStorage.setItem(
        "role",
        result.role
        );



        window.location.href =
        "/shipments.html";

    }

    else{

        alert(
        "بيانات الدخول غير صحيحة"
        );

    }

});

</script>

</body>

</html>
