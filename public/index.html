<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نقطة شحن | تسجيل الدخول</title>

<style>

body{
margin:0;
padding:0;
background:#0f0f0f;
font-family:Tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
direction:rtl;
}

.login-box{
background:#1a1a1a;
padding:40px;
border-radius:20px;
width:350px;
box-shadow:0 0 20px rgba(255,215,0,0.3);
text-align:center;
}

.logo{
font-size:35px;
color:#FFD700;
margin-bottom:10px;
font-weight:bold;
}

.sub{
color:white;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#2c2c2c;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#FFD700;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffcc00;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
🚚 نقطة شحن
</div>

<div class="sub">
Noqta Shipping
</div>

<input type="text" id="employeeNumber" placeholder="الرقم الوظيفي">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">
تسجيل الدخول
</button>

</div>

<script>

async function login(){

let employeeNumber =
document.getElementById("employeeNumber").value;

let password =
document.getElementById("password").value;

if(
employeeNumber === "admin"
&&
password === "Faisal@12"
){

localStorage.setItem("employee","admin");

window.location.href = "dashboard.html";

return;

}

let response = await fetch("/employees");

let employees = await response.json();

let employee = employees.find(emp =>

emp.employee_number == employeeNumber

&&

emp.password == password

);

if(employee){

localStorage.setItem(
"employee",
employee.employee_number
);

window.location.href = "dashboard.html";

}else{

alert("بيانات الدخول غير صحيحة");

}

}

</script>

</body>
</html>
