<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>قائمة الشحنات | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:white;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#1c1c1c;
color:white;
border-radius:15px;
overflow:hidden;
}

th, td{
padding:15px;
text-align:center;
border-bottom:1px solid #333;
font-size:14px;
}

th{
background:#FFD700;
color:black;
}

tr:hover{
background:#2a2a2a;
}

.actions button,
.actions select{

padding:8px 12px;
margin:3px;
border:none;
border-radius:8px;
font-weight:bold;
}

.delete-btn{
background:#ff4d4d;
color:white;
cursor:pointer;
}

.print-btn{
background:#FFD700;
color:black;
cursor:pointer;
}

select{
background:#222;
color:white;
}

</style>

</head>

<body>

<div class="main">

<h1>📦 قائمة الشحنات</h1>

<div class="search-box">

<input
type="text"
id="search"
placeholder="بحث برقم الشحنة أو الاسم..."
onkeyup="searchShipments()"
>

</div>

<table>

<thead>

<tr>

<th>رقم الشحنة</th>

<th>المرسل</th>

<th>المستلم</th>

<th>عنوان المرسل</th>

<th>عنوان المستلم</th>

<th>السعر</th>

<th>الحالة</th>

<th>التاريخ</th>

<th>التحكم</th>

</tr>

</thead>

<tbody id="shipmentsTable">

</tbody>

</table>

</div>

<script>

let allShipments = [];

async function loadShipments(){

let response = await fetch("/shipments");

allShipments = await response.json();

displayShipments(allShipments);

}

function displayShipments(shipments){

let table = document.getElementById("shipmentsTable");

table.innerHTML = "";

shipments.forEach(shipment => {

table.innerHTML += `

<tr>

<td>${shipment.shipment_number}</td>

<td>${shipment.sender_name}</td>

<td>${shipment.receiver_name}</td>

<td>${shipment.sender_address}</td>

<td>${shipment.receiver_address}</td>

<td>${shipment.price} ريال</td>

<td>

<select onchange="updateStatus(${shipment.id}, this.value)">

<option ${shipment.status === "جديدة" ? "selected" : ""}>
جديدة
</option>

<option ${shipment.status === "تم الشحن" ? "selected" : ""}>
تم الشحن
</option>

<option ${shipment.status === "بالطريق" ? "selected" : ""}>
بالطريق
</option>

<option ${shipment.status === "بانتظار الاستلام" ? "selected" : ""}>
بانتظار الاستلام
</option>

<option ${shipment.status === "تم التسليم" ? "selected" : ""}>
تم التسليم
</option>

</select>

</td>

<td>${shipment.date}</td>

<td class="actions">

<button class="print-btn"
onclick="printShipment('${shipment.shipment_number}')">
🖨️
</button>

<button class="delete-btn"
onclick="deleteShipment(${shipment.id})">
🗑️
</button>

</td>

</tr>

`;

});

}

function searchShipments(){

let search = document
.getElementById("search")
.value
.toLowerCase();

let filtered = allShipments.filter(shipment => {

return (

shipment.shipment_number.toLowerCase().includes(search)

||

shipment.sender_name.toLowerCase().includes(search)

||

shipment.receiver_name.toLowerCase().includes(search)

);

});

displayShipments(filtered);

}

async function deleteShipment(id){

let confirmDelete = confirm("هل أنت متأكد من حذف الشحنة؟");

if(confirmDelete){

await fetch("/delete-shipment/" + id, {

method:"DELETE"

});

loadShipments();

}

}

async function updateStatus(id, status){

await fetch("/update-status/" + id, {

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
status:status
})

});

}

function printShipment(number){

window.open("/label.html");

}

loadShipments();

</script>

</body>
</html>
