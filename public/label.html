<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>بوليصة الشحنة | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#f5f5f5;
    padding:20px;
}

.label-card{

    max-width:450px;

    margin:auto;

    background:white;

    border-radius:20px;

    padding:20px;

    box-shadow:0 0 15px rgba(0,0,0,.1);

}

.logo{

    text-align:center;

    font-size:32px;

    font-weight:bold;

    color:#ff9800;

    margin-bottom:20px;

}

.shipment-number{

    background:#ff9800;

    color:white;

    padding:15px;

    border-radius:15px;

    text-align:center;

    font-size:24px;

    font-weight:bold;

    margin-bottom:20px;

}

.section{

    background:#fafafa;

    border-radius:15px;

    padding:15px;

    margin-bottom:15px;

}

.section-title{

    font-size:18px;

    font-weight:bold;

    margin-bottom:10px;

    color:#666;

}

.section-content{

    line-height:2;

    font-size:17px;

}

.status{

    background:#4caf50;

    color:white;

    text-align:center;

    padding:12px;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

}

.print-btn{

    width:100%;

    margin-top:20px;

    background:#ff9800;

    color:white;

    border:none;

    padding:15px;

    border-radius:15px;

    font-size:20px;

    cursor:pointer;

}

.footer{

    text-align:center;

    margin-top:25px;

    color:#777;

}

@media print{

    .print-btn{

        display:none;

    }

}

</style>

</head>

<body>

<div class="label-card">

<div class="logo">

🚚 نقطة شحن

</div>



<div
class="shipment-number"
id="shipmentNumber">

HB-2026-0001

</div>



<div class="section">

<div class="section-title">

بيانات المرسل

</div>

<div
class="section-content"
id="senderData">

</div>

</div>



<div class="section">

<div class="section-title">

بيانات المستلم

</div>

<div
class="section-content"
id="receiverData">

</div>

</div>



<div class="section">

<div class="section-title">

تفاصيل الشحنة

</div>

<div
class="section-content"
id="shipmentDetails">

</div>

</div>



<div
class="status"
id="shipmentStatus">

جديدة

</div>



<button
class="print-btn"
onclick="window.print()">

🖨️ طباعة البوليصة

</button>



<div class="footer">

شكراً لاختياركم نقطة شحن ❤️

</div>

</div>



<script>

async function loadShipment(){

    const params =
    new URLSearchParams(
    window.location.search
    );

    const number =
    params.get("number");



    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    const shipment =
    shipments.find(

        s =>

        s.shipmentNumber === number

    );



    if(!shipment){

        document.body.innerHTML =

        "<h2 style='text-align:center'>الشحنة غير موجودة</h2>";

        return;

    }



    document.getElementById(
    "shipmentNumber"
    ).innerText =

    shipment.shipmentNumber;



    document.getElementById(
    "senderData"
    ).innerHTML =

    `
    الاسم:
    ${shipment.senderName}

    <br><br>

    الجوال:
    ${shipment.senderPhone}

    <br><br>

    العنوان:
    ${shipment.senderCity}
    `;



    document.getElementById(
    "receiverData"
    ).innerHTML =

    `
    الاسم:
    ${shipment.receiverName}

    <br><br>

    الجوال:
    ${shipment.receiverPhone}

    <br><br>

    العنوان:
    ${shipment.receiverCity}
    `;



    document.getElementById(
    "shipmentDetails"
    ).innerHTML =

    `
    عدد القطع:
    ${shipment.pieces}

    <br><br>

    الوزن:
    ${shipment.weight} كجم

    <br><br>

    السعر:
    ${shipment.price} ريال

    <br><br>

    التغليف:
    ${shipment.packaging}

    <br><br>

    نوع الخدمة:
    ${shipment.deliveryType}

    <br><br>

    التاريخ:
    ${shipment.date}

    <br><br>

    الوقت:
    ${shipment.time}
    `;



    document.getElementById(
    "shipmentStatus"
    ).innerText =

    shipment.status;

}



loadShipment();

</script>

</body>

</html>
