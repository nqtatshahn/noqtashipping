<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>التوصيل والاحتفاظ | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.delivery-card{

    background:#1d1d1d;

    border-radius:20px;

    padding:20px;

    margin-top:20px;

}

.delivery-type{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    margin-top:10px;

}

.delivery-badge{

    background:#2a2a2a;

    padding:10px 15px;

    border-radius:10px;

}

.price-box{

    background:#4caf50;

    padding:15px;

    border-radius:15px;

    text-align:center;

    font-size:24px;

    font-weight:bold;

    margin-top:15px;

}

.save-btn{

    margin-top:15px;

}

</style>

</head>

<body>

<div class="container">

<h1>
🚚 التوصيل والاحتفاظ
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

<a href="/tracking.html">
التتبع
</a>

</div>



<form id="deliveryForm">

<input
type="text"
id="shipmentNumber"
placeholder="رقم الشحنة"
required
>

<select id="deliveryType">

<option value="توصيل">
توصيل
</option>

<option value="احتفاظ">
احتفاظ
</option>

<option value="توصيل سريع">
توصيل سريع
</option>

</select>

<input
type="number"
id="deliveryPrice"
placeholder="السعر"
readonly
>

<button
class="save-btn"
type="submit">

حفظ

</button>

</form>



<div class="table-container">

<table>

<thead>

<tr>

<th>
رقم الشحنة
</th>

<th>
نوع الخدمة
</th>

<th>
السعر
</th>

<th>
الحالة
</th>

</tr>

</thead>

<tbody id="deliveryTable"></tbody>

</table>

</div>

</div>



<script>

const deliveryType =
document.getElementById(
"deliveryType"
);

const deliveryPrice =
document.getElementById(
"deliveryPrice"
);



/* =========================
   حساب السعر تلقائي
========================= */

function calculateDeliveryPrice(){

    if(
    deliveryType.value ===
    "توصيل"
    ){

        deliveryPrice.value = 25;

    }

    else if(
    deliveryType.value ===
    "احتفاظ"
    ){

        deliveryPrice.value = 15;

    }

    else if(
    deliveryType.value ===
    "توصيل سريع"
    ){

        deliveryPrice.value = 50;

    }

}

deliveryType.addEventListener(
"change",
calculateDeliveryPrice
);

calculateDeliveryPrice();



/* =========================
   حفظ الخدمة
========================= */

document
.getElementById("deliveryForm")

.addEventListener(
"submit",

async function(e){

    e.preventDefault();



    const shipmentNumber =
    document.getElementById(
    "shipmentNumber"
    ).value;



    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    const shipment =
    shipments.find(

        s =>

        s.shipmentNumber ===
        shipmentNumber

    );



    if(!shipment){

        alert("الشحنة غير موجودة");

        return;

    }



    shipment.deliveryType =
    deliveryType.value;



    shipment.deliveryPrice =
    deliveryPrice.value;



    shipment.status =
    "قيد التوصيل";



    await fetch(

        "/update-status",

        {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                shipmentNumber,

                status:
                shipment.status

            })

        }

    );



    alert("تم حفظ الخدمة");

    loadDelivery();

});



/* =========================
   عرض البيانات
========================= */

async function loadDelivery(){

    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    const table =
    document.getElementById(
    "deliveryTable"
    );



    table.innerHTML = "";



    shipments.forEach(shipment => {

        table.innerHTML += `

        <tr>

            <td>
            ${shipment.shipmentNumber}
            </td>

            <td>
            ${shipment.deliveryType || "-"}
            </td>

            <td>
            ${shipment.deliveryPrice || 0}
            ريال
            </td>

            <td>
            ${shipment.status}
            </td>

        </tr>

        `;

    });

}



loadDelivery();

</script>

</body>

</html>
