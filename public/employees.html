<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>إدارة الموظفين | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.employee-card{

    background:#1d1d1d;

    border-radius:20px;

    padding:20px;

    margin-top:20px;

}

.permissions{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-top:10px;

}

.permission-item{

    background:#2a2a2a;

    padding:10px 15px;

    border-radius:10px;

}

.delete-btn{

    background:#f44336;

}

.role-badge{

    display:inline-block;

    padding:8px 15px;

    border-radius:10px;

    font-size:14px;

    font-weight:bold;

}

.role-admin{

    background:#ff9800;

    color:white;

}

.role-employee{

    background:#2196f3;

    color:white;

}

</style>

</head>

<body>

<div class="container">

<h1>
👨‍💼 إدارة الموظفين
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

<a href="/tracking.html">
التتبع
</a>

</div>



<form id="employeeForm">

<input
type="text"
id="employeeName"
placeholder="اسم الموظف"
required
>

<input
type="text"
id="employeeUsername"
placeholder="اسم المستخدم"
required
>

<input
type="password"
id="employeePassword"
placeholder="كلمة المرور"
required
>

<select id="employeeRole">

<option value="employee">
موظف
</option>

<option value="admin">
مدير
</option>

</select>

<button type="submit">

إضافة موظف

</button>

</form>



<div class="table-container">

<table>

<thead>

<tr>

<th>
الاسم
</th>

<th>
اسم المستخدم
</th>

<th>
الصلاحية
</th>

<th>
الصلاحيات
</th>

<th>
الحذف
</th>

</tr>

</thead>

<tbody id="employeesTable"></tbody>

</table>

</div>

</div>



<script>

/* =========================
   تخزين الموظفين
========================= */

let employees = JSON.parse(

localStorage.getItem("employees")

) || [

{
    name:"المدير",
    username:"admin",
    password:"1234",
    role:"admin"
},

{
    name:"الموظف",
    username:"employee",
    password:"1234",
    role:"employee"
}

];



/* =========================
   حفظ البيانات
========================= */

function saveEmployees(){

    localStorage.setItem(

        "employees",

        JSON.stringify(employees)

    );

}



/* =========================
   عرض الموظفين
========================= */

function renderEmployees(){

    const table =
    document.getElementById(
    "employeesTable"
    );



    table.innerHTML = "";



    employees.forEach((employee,index)=>{

        table.innerHTML += `

        <tr>

            <td>
            ${employee.name}
            </td>

            <td>
            ${employee.username}
            </td>

            <td>

                <span class="
                role-badge

                ${employee.role === "admin"
                ? "role-admin"
                : "role-employee"}">

                ${employee.role === "admin"
                ? "مدير"
                : "موظف"}

                </span>

            </td>

            <td>

                <div class="permissions">

                ${
                employee.role === "admin"

                ?

                `
                <div class="permission-item">
                جميع الصلاحيات
                </div>
                `

                :

                `
                <div class="permission-item">
                إضافة شحنة
                </div>

                <div class="permission-item">
                التتبع
                </div>

                <div class="permission-item">
                التغليف
                </div>

                <div class="permission-item">
                التوصيل
                </div>
                `
                }

                </div>

            </td>

            <td>

                <button

                class="delete-btn"

                onclick="
                deleteEmployee(${index})
                ">

                حذف

                </button>

            </td>

        </tr>

        `;

    });

}



/* =========================
   إضافة موظف
========================= */

document
.getElementById("employeeForm")

.addEventListener(
"submit",

function(e){

    e.preventDefault();



    const employee = {

        name:
        document.getElementById(
        "employeeName").value,



        username:
        document.getElementById(
        "employeeUsername").value,



        password:
        document.getElementById(
        "employeePassword").value,



        role:
        document.getElementById(
        "employeeRole").value

    };



    employees.push(employee);

    saveEmployees();

    renderEmployees();

    alert("تم إضافة الموظف");



    document.getElementById(
    "employeeForm"
    ).reset();

});



/* =========================
   حذف موظف
========================= */

function deleteEmployee(index){

    const confirmDelete =
    confirm("حذف الموظف؟");

    if(!confirmDelete) return;



    employees.splice(index,1);

    saveEmployees();

    renderEmployees();

}



renderEmployees();

</script>

</body>

</html>
