<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-top:30px;

}

.dashboard-card{

    background:#1d1d1d;

    border-radius:20px;

    padding:25px;

    text-align:center;

    transition:.3s;

}

.dashboard-card:hover{

    transform:translateY(-5px);

}

.dashboard-card h2{

    color:#ffb300;

    margin-bottom:15px;

}

.dashboard-number{

    font-size:40px;

    font-weight:bold;

    margin-bottom:15px;

}

.dashboard-link{

    display:inline-block;

    margin-top:10px;

    background:#ff9800;

    color:white;

    text-decoration:none;

    padding:12px 18px;

    border-radius:10px;

}

.quick-links{

    margin-top:40px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}

.quick-link{

    background:#222;

    color:white;

    text-decoration:none;

    padding:20px;

    border-radius:15px;

    text-align:center;

    font-size:18px;

    transition:.3s;

}

.quick-link:hover{

    background:#333;

}

</style>

</head>

<body>

<div class="container">

<h1>
📊 لوحة التحكم
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

<a href="/tracking.html">
التتبع
</a>

<a href="/employees.html">
الموظفين
</a>

</div>



<div class="dashboard-grid">

<div class="dashboard-card">

<h2>
إجمالي الشحنات
</h2>

<div
class="dashboard-number"
id="totalShipments">

0

</div>

<a
class="dashboard-link"
href="/list.html">

عرض الشحنات

</a>

</div>



<div class="dashboard-card">

<h2>
تم التسليم
</h2>

<div
class="dashboard-number"
id="deliveredShipments">

0

</div>

<a
class="dashboard-link"
href="/reports.html">

عرض التقارير

</a>

</div>



<div class="dashboard-card">

<h2>
قيد التوصيل
</h2>

<div
class="dashboard-number"
id="deliveryShipments">

0

</div>

<a
class="dashboard-link"
href="/delivery.html">

التوصيل

</a>

</div>



<div class="dashboard-card">

<h2>
إجمالي الأرباح
</h2>

<div
class="dashboard-number"
id="totalProfit">

0

</div>

<a
class="dashboard-link"
href="/invoices.html">

الفواتير

</a>

</div>

</div>



<div class="quick-links">

<a
class="quick-link"
href="/shipments.html">

📦 إضافة شحنة

</a>

<a
class="quick-link"
href="/tracking.html">

🚚 تتبع الشحنات

</a>

<a
class="quick-link"
href="/packaging.html">

📦 التغليف

</a>

<a
class="quick-link"
href="/delivery.html">

🚚 التوصيل والاحتفاظ

</a>

<a
class="quick-link"
href="/reports.html">

📊 التقارير

</a>

<a
class="quick-link"
href="/employees.html">

👨‍💼 الموظفين

</a>

</div>

</div>



<script>

/* =========================
   تحميل الإحصائيات
========================= */

async function loadDashboard(){

    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    let totalShipments =
    shipments.length;



    let delivered = 0;

    let delivery = 0;

    let totalProfit = 0;



    shipments.forEach(shipment => {

        totalProfit +=
        Number(shipment.price);



        if(
        shipment.status ===
        "تم التسليم"
        ){

            delivered++;

        }



        if(
        shipment.status ===
        "قيد التوصيل"
        ){

            delivery++;

        }

    });



    document.getElementById(
    "totalShipments"
    ).innerText =

    totalShipments;



    document.getElementById(
    "deliveredShipments"
    ).innerText =

    delivered;



    document.getElementById(
    "deliveryShipments"
    ).innerText =

    delivery;



    document.getElementById(
    "totalProfit"
    ).innerText =

    totalProfit + " ر.س";

}



loadDashboard();

</script>

</body>

</html>
