<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>الفواتير | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.invoice-card{

    background:#1d1d1d;

    border-radius:20px;

    padding:20px;

    margin-top:20px;

}

.invoice-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:20px;

}

.invoice-title{

    font-size:28px;

    color:#ffb300;

    font-weight:bold;

}

.invoice-number{

    background:#ff9800;

    color:white;

    padding:10px 15px;

    border-radius:10px;

    font-size:18px;

}

.invoice-section{

    background:#2a2a2a;

    border-radius:15px;

    padding:15px;

    margin-bottom:15px;

}

.invoice-section h3{

    color:#ffb300;

    margin-bottom:10px;

}

.invoice-section p{

    line-height:2;

}

.invoice-total{

    background:#4caf50;

    padding:15px;

    border-radius:15px;

    text-align:center;

    font-size:24px;

    font-weight:bold;

    margin-top:20px;

}

.print-btn{

    width:100%;

    margin-top:20px;

}

.table-container{

    margin-top:40px;

}

</style>

</head>

<body>

<div class="container">

<h1>
🧾 الفواتير
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

<a href="/tracking.html">
التتبع
</a>

</div>



<div class="search-box">

<input
type="text"
id="invoiceSearch"
placeholder="أدخل رقم الشحنة"
>

<button onclick="loadInvoice()">

عرض الفاتورة

</button>

</div>



<div
class="invoice-card"
id="invoiceCard"

style="display:none;">

<div class="invoice-header">

<div class="invoice-title">

نقطة شحن

</div>

<div
class="invoice-number"
id="invoiceNumber">

</div>

</div>



<div class="invoice-section">

<h3>
بيانات المرسل
</h3>

<p id="senderInfo"></p>

</div>



<div class="invoice-section">

<h3>
بيانات المستلم
</h3>

<p id="receiverInfo"></p>

</div>



<div class="invoice-section">

<h3>
تفاصيل الشحنة
</h3>

<p id="shipmentInfo"></p>

</div>



<div
class="invoice-total"
id="invoiceTotal">

</div>



<button
class="print-btn"
onclick="window.print()">

🖨️ طباعة الفاتورة

</button>

</div>



<div class="table-container">

<table>

<thead>

<tr>

<th>
رقم الشحنة
</th>

<th>
المرسل
</th>

<th>
المستلم
</th>

<th>
السعر
</th>

<th>
التاريخ
</th>

</tr>

</thead>

<tbody id="invoiceTable"></tbody>

</table>

</div>

</div>



<script>

let shipmentsData = [];



/* =========================
   تحميل البيانات
========================= */

async function loadShipments(){

    const response =
    await fetch("/shipments");

    shipmentsData =
    await response.json();

    renderTable();

}



/* =========================
   عرض الجدول
========================= */

function renderTable(){

    const table =
    document.getElementById(
    "invoiceTable"
    );



    table.innerHTML = "";



    shipmentsData.forEach(shipment => {

        table.innerHTML += `

        <tr>

            <td>
            ${shipment.shipmentNumber}
            </td>

            <td>
            ${shipment.senderName}
            </td>

            <td>
            ${shipment.receiverName}
            </td>

            <td>
            ${shipment.price} ريال
            </td>

            <td>
            ${shipment.date}
            </td>

        </tr>

        `;

    });

}



/* =========================
   تحميل الفاتورة
========================= */

function loadInvoice(){

    const number =
    document.getElementById(
    "invoiceSearch"
    ).value;



    const shipment =
    shipmentsData.find(

        s =>

        s.shipmentNumber === number

    );



    if(!shipment){

        alert("الفاتورة غير موجودة");

        return;

    }



    document.getElementById(
    "invoiceCard"
    ).style.display = "block";



    document.getElementById(
    "invoiceNumber"
    ).innerText =

    shipment.shipmentNumber;



    document.getElementById(
    "senderInfo"
    ).innerHTML =

    `
    الاسم:
    ${shipment.senderName}

    <br>

    الجوال:
    ${shipment.senderPhone}

    <br>

    العنوان:
    ${shipment.senderCity}
    `;



    document.getElementById(
    "receiverInfo"
    ).innerHTML =

    `
    الاسم:
    ${shipment.receiverName}

    <br>

    الجوال:
    ${shipment.receiverPhone}

    <br>

    العنوان:
    ${shipment.receiverCity}
    `;



    document.getElementById(
    "shipmentInfo"
    ).innerHTML =

    `
    عدد القطع:
    ${shipment.pieces}

    <br>

    الوزن:
    ${shipment.weight} كجم

    <br>

    التغليف:
    ${shipment.packaging}

    <br>

    نوع الخدمة:
    ${shipment.deliveryType}

    <br>

    الحالة:
    ${shipment.status}

    <br>

    التاريخ:
    ${shipment.date}

    <br>

    الوقت:
    ${shipment.time}
    `;



    document.getElementById(
    "invoiceTotal"
    ).innerText =

    "الإجمالي: " +

    shipment.price +

    " ريال";

}



loadShipments();

</script>

</body>

</html>
