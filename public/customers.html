<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>العملاء | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.customer-card{

    background:#1d1d1d;

    border-radius:20px;

    padding:20px;

    margin-top:20px;

}

.customer-badge{

    display:inline-block;

    background:#4caf50;

    color:white;

    padding:8px 15px;

    border-radius:10px;

    font-size:14px;

}

.notes-box{

    background:#2a2a2a;

    padding:10px;

    border-radius:10px;

    min-width:200px;

}

.delete-btn{

    background:#f44336;

}

.stats-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:30px;

}

.stats-card{

    background:#1d1d1d;

    border-radius:15px;

    padding:20px;

    text-align:center;

}

.stats-card h2{

    color:#ffb300;

    margin-bottom:15px;

}

.stats-number{

    font-size:35px;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>
👥 العملاء
</h1>



<div class="top-buttons">

<a href="/dashboard.html">
لوحة التحكم
</a>

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

</div>



<div class="stats-grid">

<div class="stats-card">

<h2>
إجمالي العملاء
</h2>

<div
class="stats-number"
id="totalCustomers">

0

</div>

</div>



<div class="stats-card">

<h2>
العملاء النشطين
</h2>

<div
class="stats-number"
id="activeCustomers">

0

</div>

</div>

</div>



<form id="customerForm">

<input
type="text"
id="customerName"
placeholder="اسم العميل"
required
>

<input
type="text"
id="customerPhone"
placeholder="رقم الجوال"
required
>

<input
type="text"
id="customerAddress"
placeholder="العنوان"
required
>

<textarea
id="customerNotes"
placeholder="ملاحظات"
></textarea>

<button type="submit">

إضافة عميل

</button>

</form>



<div class="table-container">

<table>

<thead>

<tr>

<th>
الاسم
</th>

<th>
الجوال
</th>

<th>
العنوان
</th>

<th>
الملاحظات
</th>

<th>
الحالة
</th>

<th>
الحذف
</th>

</tr>

</thead>

<tbody id="customersTable"></tbody>

</table>

</div>

</div>



<script>

/* =========================
   تخزين العملاء
========================= */

let customers = JSON.parse(

localStorage.getItem("customers")

) || [];



/* =========================
   حفظ البيانات
========================= */

function saveCustomers(){

    localStorage.setItem(

        "customers",

        JSON.stringify(customers)

    );

}



/* =========================
   عرض العملاء
========================= */

function renderCustomers(){

    const table =
    document.getElementById(
    "customersTable"
    );



    table.innerHTML = "";



    customers.forEach((customer,index)=>{

        table.innerHTML += `

        <tr>

            <td>
            ${customer.name}
            </td>

            <td>
            ${customer.phone}
            </td>

            <td>
            ${customer.address}
            </td>

            <td>

                <div class="notes-box">

                ${customer.notes || "-"}

                </div>

            </td>

            <td>

                <span class="customer-badge">

                نشط

                </span>

            </td>

            <td>

                <button

                class="delete-btn"

                onclick="
                deleteCustomer(${index})
                ">

                حذف

                </button>

            </td>

        </tr>

        `;

    });



    document.getElementById(
    "totalCustomers"
    ).innerText =

    customers.length;



    document.getElementById(
    "activeCustomers"
    ).innerText =

    customers.length;

}



/* =========================
   إضافة عميل
========================= */

document
.getElementById("customerForm")

.addEventListener(
"submit",

function(e){

    e.preventDefault();



    const customer = {

        name:
        document.getElementById(
        "customerName").value,



        phone:
        document.getElementById(
        "customerPhone").value,



        address:
        document.getElementById(
        "customerAddress").value,



        notes:
        document.getElementById(
        "customerNotes").value

    };



    customers.push(customer);

    saveCustomers();

    renderCustomers();



    alert("تم إضافة العميل");



    document.getElementById(
    "customerForm"
    ).reset();

});



/* =========================
   حذف عميل
========================= */

function deleteCustomer(index){

    const confirmDelete =
    confirm("حذف العميل؟");

    if(!confirmDelete) return;



    customers.splice(index,1);

    saveCustomers();

    renderCustomers();

}



renderCustomers();

</script>

</body>

</html>
