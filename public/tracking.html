<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>تتبع الشحنات | نقطة شحن</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:tahoma;
}

h1{
    text-align:center;
    color:#ffb300;
    margin-bottom:30px;
}

.top-buttons{
    max-width:1200px;
    margin:auto;
    margin-bottom:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.top-buttons a{
    background:#222;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
}

.top-buttons a:hover{
    background:#333;
}

.search-box{

    max-width:700px;

    margin:auto;

    display:flex;

    gap:10px;

    margin-bottom:30px;

}

.search-box input{

    flex:1;

    padding:15px;

    border:none;

    border-radius:10px;

    font-size:16px;

}

.search-box button{

    background:#ff9800;

    color:white;

    border:none;

    padding:15px 25px;

    border-radius:10px;

    font-size:16px;

    cursor:pointer;

}

.search-box button:hover{

    background:#e68900;

}

.card{

    max-width:700px;

    margin:auto;

    background:#1d1d1d;

    border-radius:20px;

    padding:25px;

    display:none;

}

.section{

    margin-bottom:20px;

    padding-bottom:15px;

    border-bottom:1px solid #333;

}

.title{

    color:#ffb300;

    margin-bottom:10px;

    font-size:18px;

    font-weight:bold;

}

.value{

    line-height:2;

}

.status{

    background:#4caf50;

    color:white;

    padding:12px;

    border-radius:10px;

    text-align:center;

    font-size:18px;

    font-weight:bold;

    margin-top:15px;

}

</style>

</head>

<body>

<h1>
🚚 تتبع الشحنات
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

</div>



<div class="search-box">

<input
type="text"
id="trackingNumber"
placeholder="أدخل رقم الشحنة"
>

<button onclick="trackShipment()">

تتبع

</button>

</div>



<div class="card" id="trackingCard">

<div class="section">

<div class="title">
رقم الشحنة
</div>

<div
class="value"
id="shipmentNumber">

</div>

</div>



<div class="section">

<div class="title">
بيانات المرسل
</div>

<div
class="value"
id="senderData">

</div>

</div>



<div class="section">

<div class="title">
بيانات المستلم
</div>

<div
class="value"
id="receiverData">

</div>

</div>



<div class="section">

<div class="title">
تفاصيل الشحنة
</div>

<div
class="value"
id="shipmentDetails">

</div>

</div>



<div
class="status"
id="shipmentStatus">

</div>

</div>



<script>

/* =========================
   تتبع الشحنة
========================= */

async function trackShipment(){

    const number =
    document.getElementById(
    "trackingNumber"
    ).value;



    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    const shipment =
    shipments.find(

        s =>

        s.shipmentNumber === number

    );



    if(!shipment){

        alert("الشحنة غير موجودة");

        return;

    }



    document.getElementById(
    "trackingCard"
    ).style.display = "block";



    document.getElementById(
    "shipmentNumber"
    ).innerText =

    shipment.shipmentNumber;



    document.getElementById(
    "senderData"
    ).innerHTML =

    `
    الاسم:
    ${shipment.senderName}

    <br><br>

    الجوال:
    ${shipment.senderPhone}

    <br><br>

    العنوان:
    ${shipment.senderCity}
    `;



    document.getElementById(
    "receiverData"
    ).innerHTML =

    `
    الاسم:
    ${shipment.receiverName}

    <br><br>

    الجوال:
    ${shipment.receiverPhone}

    <br><br>

    العنوان:
    ${shipment.receiverCity}
    `;



    document.getElementById(
    "shipmentDetails"
    ).innerHTML =

    `
    عدد القطع:
    ${shipment.pieces}

    <br><br>

    الوزن:
    ${shipment.weight} كجم

    <br><br>

    السعر:
    ${shipment.price} ريال

    <br><br>

    التغليف:
    ${shipment.packaging}

    <br><br>

    نوع الخدمة:
    ${shipment.deliveryType}

    <br><br>

    التاريخ:
    ${shipment.date}

    <br><br>

    الوقت:
    ${shipment.time}
    `;



    document.getElementById(
    "shipmentStatus"
    ).innerText =

    shipment.status;

}

</script>

</body>

</html>
