<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة شحنة | نقطة شحن</title>

<style>

body{
    margin:0;
    font-family:Tahoma;
    background:#111;
    color:white;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#ffb347;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#e68900;
}

</style>
</head>

<body>

<div class="container">

<h1>📦 إضافة شحنة</h1>

<div class="form-grid">

<input id="senderName" placeholder="اسم المرسل">
<input id="senderPhone" placeholder="جوال المرسل">
<input id="senderCity" placeholder="مدينة الإرسال">

<input id="receiverName" placeholder="اسم المستلم">
<input id="receiverPhone" placeholder="جوال المستلم">
<input id="receiverCity" placeholder="مدينة التسليم">

<input id="pieces" type="number" placeholder="عدد القطع">

<input id="weight" type="number" placeholder="الوزن">

<input id="price" type="number" placeholder="السعر">

</div>

<button onclick="addShipment()">
إضافة الشحنة
</button>

</div>

<script>

async function addShipment() {

    const data = {

        senderName: document.getElementById('senderName').value,
        senderPhone: document.getElementById('senderPhone').value,
        senderCity: document.getElementById('senderCity').value,

        receiverName: document.getElementById('receiverName').value,
        receiverPhone: document.getElementById('receiverPhone').value,
        receiverCity: document.getElementById('receiverCity').value,

        pieces: document.getElementById('pieces').value,
        weight: document.getElementById('weight').value,
        price: document.getElementById('price').value
    };

    try {

        const response = await fetch('/api/shipments', {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)
        });

        const result = await response.json();

        if(result.success){

            alert('تمت إضافة الشحنة بنجاح');

            window.location.href =
            '/shipment/' + result.shipment.shipmentNumber;

        } else {

            alert('حدث خطأ');

        }

    } catch(err){

        console.log(err);

        alert('فشل الاتصال بالسيرفر');
    }
}

</script>

</body>
</html>
