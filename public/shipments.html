<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>إضافة شحنة</title>

<style>

body{
background:#111;
font-family:Tahoma;
direction:rtl;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
color:#f6b32d;
}

form{
display:grid;
gap:15px;
}

input,
select,
button{

padding:15px;
border:none;
border-radius:10px;
font-size:16px;

}

input,
select{
background:#222;
color:white;
}

button{
background:#f6b32d;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>
📦 إضافة شحنة
</h1>

<form id="shipmentForm">

<input type="text"
id="sender_name"
placeholder="اسم المرسل"
required>

<input type="text"
id="sender_phone"
placeholder="جوال المرسل"
required>

<input type="text"
id="receiver_name"
placeholder="اسم المستلم"
required>

<input type="text"
id="receiver_phone"
placeholder="جوال المستلم"
required>

<input type="text"
id="from_city"
placeholder="مدينة الإرسال"
required>

<input type="text"
id="to_city"
placeholder="مدينة التسليم"
required>

<input type="number"
id="weight"
placeholder="الوزن"
required>

<input type="number"
id="pieces"
placeholder="عدد القطع"
required>

<input type="number"
id="price"
placeholder="السعر"
required>

<select id="payment_method">

<option value="كاش">
كاش
</option>

<option value="تحويل">
تحويل
</option>

<option value="شبكة">
شبكة
</option>

</select>

<button type="submit">

➕ إضافة الشحنة

</button>

</form>

</div>

<script>

document.getElementById("shipmentForm")

.addEventListener("submit",

async function(e){

e.preventDefault();

let response = await fetch(

"/add-shipment",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

sender_name:
document.getElementById("sender_name").value,

sender_phone:
document.getElementById("sender_phone").value,

receiver_name:
document.getElementById("receiver_name").value,

receiver_phone:
document.getElementById("receiver_phone").value,

from_city:
document.getElementById("from_city").value,

to_city:
document.getElementById("to_city").value,

weight:
document.getElementById("weight").value,

pieces:
document.getElementById("pieces").value,

price:
document.getElementById("price").value,

payment_method:
document.getElementById("payment_method").value,

employee_number:
localStorage.getItem("employee")

})

}

);

let result = await response.json();

if(result.success){

alert("✅ تمت إضافة الشحنة");

document.getElementById("shipmentForm").reset();

}else{

alert("❌ حدث خطأ");

console.log(result);

}

});

</script>

</body>

</html>
