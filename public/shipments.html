<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>إضافة شحنة | نقطة شحن</title>

<style>

body{

margin:0;
padding:0;
background:#111;
font-family:Tahoma;
direction:rtl;
color:white;

}

.container{

width:95%;
max-width:900px;
margin:auto;
padding:20px;

}

h1{

text-align:center;
margin-bottom:30px;
color:#f6b32d;

}

form{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;

}

input,
select,
button{

padding:15px;
border:none;
border-radius:10px;
font-size:16px;

}

input,
select{

background:#222;
color:white;

}

button{

background:#f6b32d;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="container">

<h1>
📦 إضافة شحنة
</h1>

<form id="shipmentForm">

<input type="text"
id="sender_name"
placeholder="اسم المرسل"
required>

<input type="text"
id="sender_phone"
placeholder="جوال المرسل"
required>

<input type="text"
id="sender_address"
placeholder="عنوان المرسل">

<input type="text"
id="receiver_name"
placeholder="اسم المستلم"
required>

<input type="text"
id="receiver_phone"
placeholder="جوال المستلم"
required>

<input type="text"
id="receiver_address"
placeholder="عنوان المستلم">

<input type="text"
id="from_city"
placeholder="مدينة الإرسال"
required>

<input type="text"
id="to_city"
placeholder="مدينة التسليم"
required>

<input type="number"
id="weight"
placeholder="الوزن KG"
required>

<input type="number"
id="pieces"
placeholder="عدد القطع"
required>

<input type="number"
id="price"
placeholder="السعر"
readonly>

<select id="payment_method">

<option value="كاش">
كاش
</option>

<option value="تحويل">
تحويل
</option>

<option value="شبكة">
شبكة
</option>

</select>

<button type="submit">

➕ إضافة الشحنة

</button>

</form>

</div>

<script>




/* =========================
AUTO PRICE
========================= */

document.getElementById("weight")

.addEventListener("input", calculatePrice);

document.getElementById("pieces")

.addEventListener("input", calculatePrice);

function calculatePrice(){

let weight =

Number(
document.getElementById("weight").value
);

let pieces =

Number(
document.getElementById("pieces").value
);

let price = 0;

price += weight * 10;

price += pieces * 5;

document.getElementById("price").value =

price;

}





/* =========================
ADD SHIPMENT
========================= */

document.getElementById("shipmentForm")

.addEventListener("submit",

async function(e){

e.preventDefault();




let sender_name =
document.getElementById("sender_name").value;

let sender_phone =
document.getElementById("sender_phone").value;

let sender_address =
document.getElementById("sender_address").value;

let receiver_name =
document.getElementById("receiver_name").value;

let receiver_phone =
document.getElementById("receiver_phone").value;

let receiver_address =
document.getElementById("receiver_address").value;

let from_city =
document.getElementById("from_city").value;

let to_city =
document.getElementById("to_city").value;

let weight =
document.getElementById("weight").value;

let pieces =
document.getElementById("pieces").value;

let price =
document.getElementById("price").value;

let payment_method =
document.getElementById("payment_method").value;

let employee_number =
localStorage.getItem("employee");




let response = await fetch(

"/add-shipment",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

sender_name,
sender_phone,
sender_address,

receiver_name,
receiver_phone,
receiver_address,

from_city,
to_city,

weight,
pieces,

payment_method,

price,

employee_number

})

}

);




let result =
await response.json();




if(result.success){

localStorage.setItem(

"labelData",

JSON.stringify({

shipment_number:
result.shipment_number,

sender_name:
sender_name,

sender_phone:
sender_phone,

receiver_name:
receiver_name,

receiver_phone:
receiver_phone,

from_city:
from_city,

to_city:
to_city,

weight:
weight,

pieces:
pieces,

qr_code:
result.qr_code

})

);

window.open(

"shipment-label.html",

"_blank"

);

alert("✅ تم إضافة الشحنة");

document.getElementById("shipmentForm").reset();

}else{

alert("❌ حدث خطأ");

}

});

</script>

</body>

</html>
