<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>إضافة شحنة | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>
📦 إضافة شحنة
</h1>

<form id="shipmentForm">

<input type="text"
id="sender_name"
placeholder="اسم المرسل"
required>

<input type="text"
id="sender_phone"
placeholder="جوال المرسل"
required>

<input type="text"
id="sender_address"
placeholder="عنوان المرسل">

<input type="text"
id="receiver_name"
placeholder="اسم المستلم"
required>

<input type="text"
id="receiver_phone"
placeholder="جوال المستلم"
required>

<input type="text"
id="receiver_address"
placeholder="عنوان المستلم">

<input type="text"
id="from_city"
placeholder="مدينة الإرسال"
required>

<input type="text"
id="to_city"
placeholder="مدينة التسليم"
required>

<input type="number"
id="weight"
placeholder="الوزن KG"
required>

<input type="number"
id="pieces"
placeholder="عدد القطع"
required>

<select id="payment_method">

<option value="كاش">
كاش
</option>

<option value="تحويل">
تحويل
</option>

<option value="شبكة">
شبكة
</option>

</select>

<input type="number"
id="price"
placeholder="السعر"
required>

<button type="submit">

➕ إضافة الشحنة

</button>

</form>

</div>

<script>

document.getElementById("shipmentForm")

.addEventListener("submit",

async function(e){

e.preventDefault();




let sender_name =
document.getElementById("sender_name").value;

let sender_phone =
document.getElementById("sender_phone").value;

let sender_address =
document.getElementById("sender_address").value;

let receiver_name =
document.getElementById("receiver_name").value;

let receiver_phone =
document.getElementById("receiver_phone").value;

let receiver_address =
document.getElementById("receiver_address").value;

let from_city =
document.getElementById("from_city").value;

let to_city =
document.getElementById("to_city").value;

let weight =
document.getElementById("weight").value;

let pieces =
document.getElementById("pieces").value;

let payment_method =
document.getElementById("payment_method").value;

let price =
document.getElementById("price").value;

let employee_number =
localStorage.getItem("employee");




let response = await fetch(

"/add-shipment",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

sender_name,
sender_phone,
sender_address,

receiver_name,
receiver_phone,
receiver_address,

from_city,
to_city,

weight,
pieces,

payment_method,

price,

employee_number

})

}

);




let result =
await response.json();




if(result.success){

localStorage.setItem(

"labelData",

JSON.stringify({

shipment_number:
result.shipment_number,

sender_name:
sender_name,

sender_phone:
sender_phone,

receiver_name:
receiver_name,

receiver_phone:
receiver_phone,

from_city:
from_city,

to_city:
to_city,

weight:
weight,

pieces:
pieces,

qr_code:
result.qr_code

})

);

window.open(

"shipment-label.html",

"_blank"

);

alert("✅ تم إضافة الشحنة");

document.getElementById("shipmentForm").reset();

}else{

alert("❌ حدث خطأ");

}

});

</script>

</body>

</html>
