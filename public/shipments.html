<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة شحنة | نقطة شحن</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:tahoma;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#ffb300;
}

form{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

input,select{
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#ff9800;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e68900;
}

.top-buttons{
    max-width:1100px;
    margin:auto;
    margin-bottom:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.top-buttons a{
    background:#222;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
}

.top-buttons a:hover{
    background:#333;
}

</style>

</head>

<body>

<h1>📦 إضافة شحنة</h1>

<div class="top-buttons">

<a href="/list.html">قائمة الشحنات</a>

<a href="/tracking.html">تتبع الشحنات</a>

<a href="/packaging.html">التغليف</a>

<a href="/delivery.html">التوصيل والاحتفاظ</a>

</div>

<form id="shipmentForm">

<input type="text" id="senderName" placeholder="اسم المرسل" required>

<input type="text" id="senderPhone" placeholder="رقم المرسل" required>

<input type="text" id="senderCity" placeholder="عنوان المرسل" required>

<input type="text" id="receiverName" placeholder="اسم المستلم" required>

<input type="text" id="receiverPhone" placeholder="رقم المستلم" required>

<input type="text" id="receiverCity" placeholder="عنوان المستلم" required>

<input type="number" id="pieces" placeholder="عدد القطع" required>

<input type="number" id="weight" placeholder="الوزن بالكيلو" required>

<input type="number" id="price" placeholder="السعر" readonly>

<select id="packaging">

<option value="بدون">تغليف بدون</option>

<option value="عادي">تغليف عادي</option>

<option value="ممتاز">تغليف ممتاز</option>

</select>

<select id="deliveryType">

<option value="توصيل">توصيل</option>

<option value="احتفاظ">احتفاظ</option>

</select>

<button type="submit">
إضافة الشحنة
</button>

</form>

<script>

const piecesInput = document.getElementById("pieces");
const weightInput = document.getElementById("weight");
const priceInput = document.getElementById("price");



/* =========================
   حساب السعر تلقائي
========================= */

function calculatePrice(){

    const pieces = Number(piecesInput.value) || 0;

    const weight = Number(weightInput.value) || 0;

    let total = 0;

    total += pieces * 10;

    total += weight * 5;

    priceInput.value = total;

}

piecesInput.addEventListener("input", calculatePrice);

weightInput.addEventListener("input", calculatePrice);



/* =========================
   إضافة الشحنة
========================= */

document.getElementById("shipmentForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const shipmentData = {

        senderName:
        document.getElementById("senderName").value,

        senderPhone:
        document.getElementById("senderPhone").value,

        senderCity:
        document.getElementById("senderCity").value,

        receiverName:
        document.getElementById("receiverName").value,

        receiverPhone:
        document.getElementById("receiverPhone").value,

        receiverCity:
        document.getElementById("receiverCity").value,

        pieces:
        document.getElementById("pieces").value,

        weight:
        document.getElementById("weight").value,

        price:
        document.getElementById("price").value,

        packaging:
        document.getElementById("packaging").value,

        deliveryType:
        document.getElementById("deliveryType").value

    };

    const response = await fetch("/add-shipment", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(shipmentData)

    });

    const result = await response.json();

    if(result.success){

        alert(
            "تم إضافة الشحنة رقم: " +
            result.shipmentNumber
        );

        window.location.href = "/list.html";

    }else{

        alert("حدث خطأ");

    }

});

</script>

</body>
</html>
