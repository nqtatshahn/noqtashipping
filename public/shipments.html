<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة شحنة</title>

<style>

body{
margin:0;
background:#111;
font-family:Tahoma;
color:white;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#f6b32d;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,
button{

padding:15px;
border:none;
border-radius:10px;
font-size:16px;

}

input{
background:#222;
color:white;
}

button{
background:#f6b32d;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>
📦 إضافة شحنة
</h1>

<div class="grid">

<input id="senderName" placeholder="اسم المرسل">

<input id="senderPhone" placeholder="جوال المرسل">

<input id="senderCity" placeholder="مدينة الإرسال">

<input id="receiverName" placeholder="اسم المستلم">

<input id="receiverPhone" placeholder="جوال المستلم">

<input id="receiverCity" placeholder="مدينة التسليم">

<input id="pieces" type="number" placeholder="عدد القطع">

<input id="weight" type="number" placeholder="الوزن">

<input id="price" type="number" placeholder="السعر">

</div>

<button onclick="addShipment()">

➕ إضافة الشحنة

</button>

</div>

<script>

async function addShipment(){

const data = {

senderName:
document.getElementById("senderName").value,

senderPhone:
document.getElementById("senderPhone").value,

senderCity:
document.getElementById("senderCity").value,

receiverName:
document.getElementById("receiverName").value,

receiverPhone:
document.getElementById("receiverPhone").value,

receiverCity:
document.getElementById("receiverCity").value,

pieces:
document.getElementById("pieces").value,

weight:
document.getElementById("weight").value,

price:
document.getElementById("price").value

};

const response = await fetch(

"/api/shipments",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

}

);

const result = await response.json();

if(result.success){

localStorage.setItem(

"shipment",

JSON.stringify(result.shipment)

);

window.open(

"/shipment-label.html",

"_blank"

);

}else{

alert("حدث خطأ");

}

}

</script>

</body>

</html>
