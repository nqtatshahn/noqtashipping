<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>التقارير | نقطة شحن</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:tahoma;
}

h1{
    text-align:center;
    color:#ffb300;
    margin-bottom:30px;
}

.top-buttons{
    max-width:1200px;
    margin:auto;
    margin-bottom:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.top-buttons a{
    background:#222;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
}

.top-buttons a:hover{
    background:#333;
}

.cards{

    max-width:1200px;
    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

}

.card{

    background:#1d1d1d;

    border-radius:15px;

    padding:25px;

    text-align:center;

    box-shadow:0 0 10px rgba(0,0,0,.3);

}

.card h2{

    margin-bottom:15px;

    color:#ffb300;

}

.number{

    font-size:35px;

    font-weight:bold;

}

.table-container{

    max-width:1200px;

    margin:auto;

    margin-top:40px;

    overflow:auto;

}

table{

    width:100%;

    border-collapse:collapse;

    background:#1d1d1d;

}

th{

    background:#ffb300;

    color:black;

    padding:15px;

}

td{

    padding:12px;

    text-align:center;

    border-bottom:1px solid #333;

}

</style>

</head>

<body>

<h1>
📊 التقارير والإحصائيات
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/tracking.html">
تتبع الشحنات
</a>

</div>



<div class="cards">

<div class="card">

<h2>
إجمالي الشحنات
</h2>

<div
class="number"
id="totalShipments">

0

</div>

</div>



<div class="card">

<h2>
إجمالي الأرباح
</h2>

<div
class="number"
id="totalProfit">

0

</div>

</div>



<div class="card">

<h2>
تم التسليم
</h2>

<div
class="number"
id="deliveredShipments">

0

</div>

</div>



<div class="card">

<h2>
قيد التوصيل
</h2>

<div
class="number"
id="pendingShipments">

0

</div>

</div>

</div>



<div class="table-container">

<table>

<thead>

<tr>

<th>
رقم الشحنة
</th>

<th>
المرسل
</th>

<th>
المستلم
</th>

<th>
السعر
</th>

<th>
الحالة
</th>

<th>
التاريخ
</th>

</tr>

</thead>

<tbody id="reportTable"></tbody>

</table>

</div>



<script>

async function loadReports(){

    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    document.getElementById(
    "totalShipments"
    ).innerText =

    shipments.length;



    let totalProfit = 0;

    let delivered = 0;

    let pending = 0;



    const table =
    document.getElementById(
    "reportTable"
    );



    table.innerHTML = "";



    shipments.forEach(shipment => {

        totalProfit +=
        Number(shipment.price);



        if(
        shipment.status ===
        "تم التسليم"
        ){

            delivered++;

        }



        if(
        shipment.status ===
        "قيد التوصيل"
        ){

            pending++;

        }



        table.innerHTML += `

        <tr>

            <td>
            ${shipment.shipmentNumber}
            </td>

            <td>
            ${shipment.senderName}
            </td>

            <td>
            ${shipment.receiverName}
            </td>

            <td>
            ${shipment.price} ريال
            </td>

            <td>
            ${shipment.status}
            </td>

            <td>
            ${shipment.date}
            </td>

        </tr>

        `;

    });



    document.getElementById(
    "totalProfit"
    ).innerText =

    totalProfit + " ريال";



    document.getElementById(
    "deliveredShipments"
    ).innerText =

    delivered;



    document.getElementById(
    "pendingShipments"
    ).innerText =

    pending;

}



loadReports();

</script>

</body>

</html>
