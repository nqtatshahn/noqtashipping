<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التغليف | نقطة شحن</title>

<link rel="stylesheet" href="style.css">

<style>

.form-box{
background:#1c1c1c;
padding:30px;
border-radius:20px;
max-width:700px;
margin:auto;
box-shadow:0 0 15px rgba(255,215,0,0.1);
margin-bottom:30px;
}

.form-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#2c2c2c;
color:white;
font-size:16px;
}

.form-box button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#FFD700;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.price-box{
background:#FFD700;
color:black;
padding:15px;
border-radius:12px;
font-size:20px;
font-weight:bold;
margin-bottom:15px;
text-align:center;
}

.result{
background:#111;
padding:20px;
border-radius:15px;
margin-top:20px;
color:white;
}

.print-btn{
background:#FFD700;
color:black;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
background:#1c1c1c;
color:white;
border-radius:15px;
overflow:hidden;
margin-top:30px;
}

th, td{
padding:15px;
text-align:center;
border-bottom:1px solid #333;
}

th{
background:#FFD700;
color:black;
}

</style>

</head>

<body>

<div class="main">

<h1>📦 التغليف</h1>

<div class="form-box">

<input type="text" id="customerName" placeholder="اسم العميل">

<input type="text" id="phone" placeholder="رقم الجوال">

<input
type="number"
id="pieces"
placeholder="عدد القطع"
oninput="calculatePrice()"
>

<div class="price-box" id="priceBox">

المبلغ: 0 ريال

</div>

<button onclick="addPackaging()">
حفظ التغليف
</button>

<div class="result" id="result">

</div>

</div>

<table>

<thead>

<tr>

<th>رقم الفاتورة</th>

<th>العميل</th>

<th>الجوال</th>

<th>عدد القطع</th>

<th>المبلغ</th>

<th>الموظف</th>

</tr>

</thead>

<tbody id="packagingTable">

</tbody>

</table>

</div>

<script>

let packagingList = [];

function calculatePrice(){

let pieces =
Number(document.getElementById("pieces").value);

let total = pieces * 8;

document.getElementById("priceBox").innerText =

"المبلغ: " + total + " ريال";

}

async function addPackaging(){

let pieces =
Number(document.getElementById("pieces").value);

let total = pieces * 8;

let invoiceNumber =
"PKG" + Math.floor(10000 + Math.random() * 90000);

let date = new Date();

let packaging = {

invoice_number: invoiceNumber,

service_type: "تغليف",

customer_name:
document.getElementById("customerName").value,

phone:
document.getElementById("phone").value,

details:
pieces + " قطع",

price:
total,

employee_number:
localStorage.getItem("employee"),

date:
date.toLocaleDateString(),

time:
date.toLocaleTimeString()

};

await fetch("/add-service", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(packaging)

});

packagingList.push(packaging);

loadPackaging();

document.getElementById("result").innerHTML = `

<h2>✅ تم حفظ الفاتورة</h2>

<p><b>رقم الفاتورة:</b>
${invoiceNumber}</p>

<p><b>عدد القطع:</b>
${pieces}</p>

<p><b>المبلغ:</b>
${total} ريال</p>

<button class="print-btn"
onclick="window.print()">

🖨️ طباعة الفاتورة

</button>

`;

}

function loadPackaging(){

let table =
document.getElementById("packagingTable");

table.innerHTML = "";

packagingList.forEach(item => {

table.innerHTML += `

<tr>

<td>${item.invoice_number}</td>

<td>${item.customer_name}</td>

<td>${item.phone}</td>

<td>${item.details}</td>

<td>${item.price} ريال</td>

<td>${item.employee_number}</td>

</tr>

`;

});

}

</script>

</body>
</html>
