<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>التغليف | نقطة شحن</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:tahoma;
}

h1{
    text-align:center;
    color:#ffb300;
    margin-bottom:30px;
}

.top-buttons{
    max-width:1200px;
    margin:auto;
    margin-bottom:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.top-buttons a{
    background:#222;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
}

.top-buttons a:hover{
    background:#333;
}

form{

    max-width:900px;

    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}

input,
select{

    padding:14px;

    border:none;

    border-radius:10px;

    font-size:16px;

}

button{

    background:#ff9800;

    color:white;

    border:none;

    padding:15px;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#e68900;

}

.table-container{

    max-width:1200px;

    margin:auto;

    margin-top:40px;

    overflow:auto;

}

table{

    width:100%;

    border-collapse:collapse;

    background:#1d1d1d;

}

th{

    background:#ffb300;

    color:black;

    padding:15px;

}

td{

    padding:12px;

    text-align:center;

    border-bottom:1px solid #333;

}

</style>

</head>

<body>

<h1>
📦 التغليف
</h1>



<div class="top-buttons">

<a href="/shipments.html">
إضافة شحنة
</a>

<a href="/list.html">
قائمة الشحنات
</a>

<a href="/reports.html">
التقارير
</a>

</div>



<form id="packagingForm">

<input
type="text"
id="shipmentNumber"
placeholder="رقم الشحنة"
required
>

<select id="packagingType">

<option value="عادي">
تغليف عادي
</option>

<option value="ممتاز">
تغليف ممتاز
</option>

<option value="خشبي">
تغليف خشبي
</option>

</select>

<input
type="number"
id="price"
placeholder="السعر"
readonly
>

<button type="submit">

حفظ التغليف

</button>

</form>



<div class="table-container">

<table>

<thead>

<tr>

<th>
رقم الشحنة
</th>

<th>
نوع التغليف
</th>

<th>
السعر
</th>

</tr>

</thead>

<tbody id="packagingTable"></tbody>

</table>

</div>



<script>

const packagingType =
document.getElementById(
"packagingType"
);

const priceInput =
document.getElementById(
"price"
);



/* =========================
   حساب السعر تلقائي
========================= */

function calculatePrice(){

    if(
    packagingType.value ===
    "عادي"
    ){

        priceInput.value = 15;

    }

    else if(
    packagingType.value ===
    "ممتاز"
    ){

        priceInput.value = 30;

    }

    else if(
    packagingType.value ===
    "خشبي"
    ){

        priceInput.value = 60;

    }

}

packagingType.addEventListener(
"change",
calculatePrice
);

calculatePrice();



/* =========================
   حفظ التغليف
========================= */

document
.getElementById("packagingForm")

.addEventListener(
"submit",

async function(e){

    e.preventDefault();

    const shipmentNumber =
    document.getElementById(
    "shipmentNumber"
    ).value;



    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    const shipment =
    shipments.find(

        s =>

        s.shipmentNumber ===
        shipmentNumber

    );



    if(!shipment){

        alert("الشحنة غير موجودة");

        return;

    }



    shipment.packaging =
    packagingType.value;



    shipment.packagingPrice =
    priceInput.value;



    await fetch(

        "/update-status",

        {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                shipmentNumber,

                status:
                shipment.status

            })

        }

    );



    alert("تم حفظ التغليف");

    loadPackaging();

});



/* =========================
   عرض التغليف
========================= */

async function loadPackaging(){

    const response =
    await fetch("/shipments");

    const shipments =
    await response.json();



    const table =
    document.getElementById(
    "packagingTable"
    );



    table.innerHTML = "";



    shipments.forEach(shipment => {

        table.innerHTML += `

        <tr>

            <td>
            ${shipment.shipmentNumber}
            </td>

            <td>
            ${shipment.packaging || "-"}
            </td>

            <td>
            ${shipment.packagingPrice || 0}
            ريال
            </td>

        </tr>

        `;

    });

}

loadPackaging();

</script>

</body>

</html>
